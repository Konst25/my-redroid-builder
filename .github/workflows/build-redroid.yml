name: Build Redroid with GApps and ARM Support

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android version'
        required: true
        default: '12.0.0'
        type: choice
        options:
          - '11.0.0'
          - '12.0.0'
          - '13.0.0'

env:
  ANDROID_VERSION: ${{ github.event.inputs.android_version || '12.0.0' }}
  IMAGE_NAME: "my-redroid"
  IMAGE_TAG: "${{ github.event.inputs.android_version || '12.0.0' }}-gapps-mindthegapps-ndk"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout redroid-script
        uses: actions/checkout@v4
        with:
          repository: ayasa520/redroid-script
          path: redroid-script

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build custom image
        working-directory: ./redroid-script
        run: |
          python redroid.py \
            -a ${{ env.ANDROID_VERSION }} \
            -mtg \
            -n \
            -c docker

      - name: Set lowercase repository owner
        id: vars
        run: |
          echo "owner_lower=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Tag image for Registry
        run: |
          REGISTRY="ghcr.io/${{ steps.vars.outputs.owner_lower }}"
          docker tag redroid/redroid:${{ env.ANDROID_VERSION }}-mindthegapps-ndk \
            $REGISTRY/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker tag redroid/redroid:${{ env.ANDROID_VERSION }}-mindthegapps-ndk \
            $REGISTRY/${{ env.IMAGE_NAME }}:latest
          echo "REGISTRY_PATH=$REGISTRY" >> $GITHUB_ENV

      - name: Log in to Registry
        run: |
          REGISTRY="ghcr.io/${{ steps.vars.outputs.owner_lower }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

      - name: Push to Registry
        run: |
          REGISTRY="ghcr.io/${{ steps.vars.outputs.owner_lower }}"
          docker push $REGISTRY/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push $REGISTRY/${{ env.IMAGE_NAME }}:latest
