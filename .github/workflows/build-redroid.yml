name: Build Redroid with GApps and ARM Support

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android version'
        required: true
        default: '13.0.0'
        type: choice
        options:
          - '12.0.0'
          - '13.0.0'

env:
  ANDROID_VERSION: ${{ github.event.inputs.android_version || '13.0.0' }}
  IMAGE_NAME: "my-redroid"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout redroid-script
        uses: actions/checkout@v4
        with:
          repository: ayasa520/redroid-script
          path: redroid-script

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        working-directory: ./redroid-script
        run: |
          pip install tqdm requests

      - name: Build custom image (без фикса ANGLE)
        working-directory: ./redroid-script
        run: |
          python redroid.py \
            -a ${{ env.ANDROID_VERSION }} \
            -mtg \
            -n \
            -c docker

      - name: Find and push image
        run: |
          IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "redroid/redroid.*${{ env.ANDROID_VERSION }}" | head -n 1)
          LOWERCASE_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REGISTRY="ghcr.io/${LOWERCASE_OWNER}/${{ env.IMAGE_NAME }}"
          TAG="${{ env.ANDROID_VERSION }}-mindthegapps-ndk"
          
          docker tag $IMAGE ${REGISTRY}:${TAG}
          docker tag $IMAGE ${REGISTRY}:latest
          
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${REGISTRY}:${TAG}
          docker push ${REGISTRY}:latest
          
          echo "✅ Образ опубликован: ${REGISTRY}:${TAG}"
