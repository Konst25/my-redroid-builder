name: Build Redroid with GApps and ARM Support

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android version'
        required: true
        default: '12.0.0'
        type: choice
        options:
          - '11.0.0'
          - '12.0.0'
          - '13.0.0'

env:
  ANDROID_VERSION: ${{ github.event.inputs.android_version || '12.0.0' }}
  IMAGE_NAME: "my-redroid"
  IMAGE_TAG: "${{ github.event.inputs.android_version || '12.0.0' }}-gapps-mindthegapps-ndk"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout redroid-script
        uses: actions/checkout@v4
        with:
          repository: ayasa520/redroid-script
          path: redroid-script

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        working-directory: ./redroid-script
        run: |
          python -m pip install --upgrade pip
          pip install tqdm requests

      - name: Build custom image
        working-directory: ./redroid-script
        run: |
          python redroid.py \
            -a ${{ env.ANDROID_VERSION }} \
            -mtg \
            -n \
            -c docker

      # НОВЫЙ ШАГ: Проверяем какие образы создались
      - name: List Docker images
        run: |
          echo "=== Список всех Docker образов ==="
          docker images
          echo "=== Поиск образа redroid ==="
          docker images | grep redroid || echo "Образы redroid не найдены"

      # НОВЫЙ ШАГ: Определяем точное имя созданного образа
      - name: Find created image
        id: find_image
        run: |
          # Ищем образ, который начинается с redroid/redroid и содержит версию Android
          CREATED_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "redroid/redroid.*${{ env.ANDROID_VERSION }}" | head -n 1)
          
          if [ -z "$CREATED_IMAGE" ]; then
            # Если не нашли, пробуем другие варианты
            CREATED_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "redroid" | head -n 1)
          fi
          
          echo "Найден образ: $CREATED_IMAGE"
          echo "created_image=$CREATED_IMAGE" >> $GITHUB_OUTPUT

      - name: Prepare lowercase registry name
        id: registry
        run: |
          LOWERCASE_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "lowercase_owner=${LOWERCASE_OWNER}" >> $GITHUB_OUTPUT
          echo "full_registry=ghcr.io/${LOWERCASE_OWNER}/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT

      - name: Tag image for Registry
        run: |
          # Используем найденное имя образа
          docker tag ${{ steps.find_image.outputs.created_image }} \
            ${{ steps.registry.outputs.full_registry }}:${{ env.IMAGE_TAG }}
          docker tag ${{ steps.find_image.outputs.created_image }} \
            ${{ steps.registry.outputs.full_registry }}:latest

      - name: Log in to Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push to Registry
        run: |
          docker push ${{ steps.registry.outputs.full_registry }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.registry.outputs.full_registry }}:latest
