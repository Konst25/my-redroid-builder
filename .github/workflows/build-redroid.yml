name: Build Redroid with GApps and ARM Support

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android version'
        required: true
        default: '13.0.0'
        type: choice
        options:
          - '11.0.0'
          - '12.0.0'
          - '12.1.0'
          - '13.0.0'
          - '14.0.0'

env:
  ANDROID_VERSION: ${{ github.event.inputs.android_version || '13.0.0' }}
  IMAGE_NAME: "my-redroid"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout redroid-script
        uses: actions/checkout@v4
        with:
          repository: ayasa520/redroid-script
          path: redroid-script

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        working-directory: ./redroid-script
        run: |
          python -m pip install --upgrade pip
          pip install tqdm requests

      - name: Determine GApps type based on Android version
        id: gapps_type
        run: |
          ANDROID_VER="${{ env.ANDROID_VERSION }}"
          
          case "$ANDROID_VER" in
            14.0.0)
              echo "GAPPS_FLAG=-lg"
              echo "GAPPS_NAME=litegapps"
              echo "Используем LiteGapps для Android 14"
              ;;
            11.0.0)
              echo "GAPPS_FLAG=-g"
              echo "GAPPS_NAME=opengapps"
              echo "Используем OpenGapps для Android 11"
              ;;
            *)
              echo "GAPPS_FLAG=-mtg"
              echo "GAPPS_NAME=mindthegapps"
              echo "Используем MindTheGapps для Android $ANDROID_VER"
              ;;
          esac
          
          echo "GAPPS_FLAG=${{ env.GAPPS_FLAG }}" >> $GITHUB_ENV
          echo "GAPPS_NAME=${{ env.GAPPS_NAME }}" >> $GITHUB_ENV

      - name: Build custom image
        working-directory: ./redroid-script
        run: |
          echo "Сборка Android ${{ env.ANDROID_VERSION }} с флагом ${{ env.GAPPS_FLAG }}"
          python redroid.py \
            -a ${{ env.ANDROID_VERSION }} \
            ${{ env.GAPPS_FLAG }} \
            -n \
            -c docker

      - name: List Docker images
        run: |
          echo "=== Список всех Docker образов ==="
          docker images
          echo "=== Поиск образа redroid ==="
          docker images | grep redroid || echo "Образы redroid не найдены"

      - name: Find created image
        id: find_image
        run: |
          # Ищем созданный образ
          CREATED_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "redroid/redroid.*${{ env.ANDROID_VERSION }}" | head -n 1)
          
          if [ -z "$CREATED_IMAGE" ]; then
            # Пробуем другие варианты тегов
            CREATED_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "redroid" | grep "${{ env.ANDROID_VERSION }}" | head -n 1)
          fi
          
          if [ -z "$CREATED_IMAGE" ]; then
            echo "❌ Образ не найден!"
            docker images
            exit 1
          fi
          
          echo "✅ Найден образ: $CREATED_IMAGE"
          echo "created_image=$CREATED_IMAGE" >> $GITHUB_OUTPUT

      - name: Fix ANGLE libraries using Dockerfile
        run: |
          echo "🔧 Исправление ANGLE библиотек через Dockerfile..."
          
          # Создаем Dockerfile для исправления
          cat > Dockerfile.fix << 'EOF'
          FROM ${{ steps.find_image.outputs.created_image }}
          
          # Переключаемся на root (UID 0)
          USER 0
          
          # Удаляем ANGLE библиотеки
          RUN rm -f /system/lib64/libGLESv2_angle.so \
              /system/lib/libGLESv2_angle.so \
              /system/lib64/egl/libGLESv2_angle.so \
              /system/lib/egl/libGLESv2_angle.so \
              /system/lib64/libEGL_angle.so \
              /system/lib/libEGL_angle.so \
              /system/lib64/libGLESv1_CM_angle.so \
              /system/lib/libGLESv1_CM_angle.so \
              /system/lib64/egl/libEGL_angle.so \
              /system/lib/egl/libEGL_angle.so 2>/dev/null || true
          
          # Создаем символические ссылки на эмуляцию
          RUN if [ -f /system/lib64/libGLESv2_emulation.so ]; then \
                ln -sf /system/lib64/libGLESv2_emulation.so /system/lib64/libGLESv2_angle.so && \
                echo "Ссылка создана для /system/lib64/libGLESv2_angle.so"; \
              fi && \
              if [ -f /system/lib/libGLESv2_emulation.so ]; then \
                ln -sf /system/lib/libGLESv2_emulation.so /system/lib/libGLESv2_angle.so && \
                echo "Ссылка создана для /system/lib/libGLESv2_angle.so"; \
              fi && \
              if [ -f /system/lib64/egl/libGLESv2_emulation.so ]; then \
                ln -sf /system/lib64/egl/libGLESv2_emulation.so /system/lib64/egl/libGLESv2_angle.so; \
              fi && \
              if [ -f /system/lib/egl/libGLESv2_emulation.so ]; then \
                ln -sf /system/lib/egl/libGLESv2_emulation.so /system/lib/egl/libGLESv2_angle.so; \
              fi
          
          # Устанавливаем переменные окружения
          ENV ANDROID_EMU_GLES_LIB=libGLESv2_emulation.so
          ENV ANGLE_DISABLE=1
          ENV LIBGL_ALWAYS_SOFTWARE=1
          
          # Возвращаемся к пользователю system
          USER system
          EOF
          
          # Собираем исправленный образ
          docker build -f Dockerfile.fix -t fixed-image:temp .
          
          echo "✅ Исправление завершено"

      - name: Verify ANGLE removal
        run: |
          echo "=== Проверка удаления ANGLE библиотек ==="
          docker run --rm fixed-image:temp sh -c "ls -la /system/lib64/libGLESv2_angle.so 2>/dev/null || echo 'ANGLE не найден - OK'"
          docker run --rm fixed-image:temp sh -c "ls -la /system/lib/libGLESv2_angle.so 2>/dev/null || echo 'ANGLE не найден - OK'"

      - name: Prepare registry
        id: registry
        run: |
          LOWERCASE_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "full_registry=ghcr.io/${LOWERCASE_OWNER}/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT
          echo "lowercase_owner=${LOWERCASE_OWNER}" >> $GITHUB_OUTPUT

      - name: Set image tag
        id: tag
        run: |
          IMAGE_TAG="${{ env.ANDROID_VERSION }}-${{ env.GAPPS_NAME }}-ndk-fixed"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Тег образа: ${IMAGE_TAG}"

      - name: Tag image for Registry
        run: |
          docker tag fixed-image:temp \
            ${{ steps.registry.outputs.full_registry }}:${{ steps.tag.outputs.image_tag }}
          docker tag fixed-image:temp \
            ${{ steps.registry.outputs.full_registry }}:latest

      - name: Log in to Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push to Registry
        run: |
          docker push ${{ steps.registry.outputs.full_registry }}:${{ steps.tag.outputs.image_tag }}
          docker push ${{ steps.registry.outputs.full_registry }}:latest
          
          echo "✅ Образ опубликован: ${{ steps.registry.outputs.full_registry }}:${{ steps.tag.outputs.image_tag }}"

      - name: Cleanup
        run: |
          docker rmi fixed-image:temp 2>/dev/null || true
          docker system prune -f
