name: Build Fixed Redroid 12 (Alternative)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout redroid-script
        uses: actions/checkout@v4
        with:
          repository: ayasa520/redroid-script
          path: redroid-script

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lzip

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build base image
        working-directory: ./redroid-script
        run: |
          pip install tqdm requests
          python redroid.py -a 12.0.0 -mtg -n -c docker

      - name: Get base image name
        id: base_image
        run: |
          BASE_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "redroid/redroid.*12.0.0" | head -n 1)
          echo "base_image=${BASE_IMAGE}" >> $GITHUB_OUTPUT
          echo "Base image: ${BASE_IMAGE}"

      - name: Create fixed image with docker commit
        run: |
          # Создаем временный контейнер
          CONTAINER_ID=$(docker create ${{ steps.base_image.outputs.base_image }})
          
          # Копируем build.prop, модифицируем и копируем обратно
          docker cp $CONTAINER_ID:/system/build.prop build.prop
          echo "ro.setupwizard.mode=DISABLED" >> build.prop
          echo "ro.setupwizard.enable_bypass=1" >> build.prop
          docker cp build.prop $CONTAINER_ID:/system/build.prop
          
          # Сохраняем образ
          LOWERCASE_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker commit $CONTAINER_ID ghcr.io/${LOWERCASE_OWNER}/my-redroid:12.0.0-fixed
          
          # Очищаем
          docker rm $CONTAINER_ID
          echo "IMAGE_NAME=ghcr.io/${LOWERCASE_OWNER}/my-redroid:12.0.0-fixed" >> $GITHUB_ENV

      - name: Push to registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${{ env.IMAGE_NAME }}
          
          echo "✅ Образ опубликован: ${{ env.IMAGE_NAME }}"
