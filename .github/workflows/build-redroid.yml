name: Build Fixed Redroid 12

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout redroid-script
        uses: actions/checkout@v4
        with:
          repository: ayasa520/redroid-script
          path: redroid-script

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lzip

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build image
        working-directory: ./redroid-script
        run: |
          pip install tqdm requests
          python redroid.py -a 12.0.0 -mtg -n -c docker

      - name: Fix native bridge
        run: |
          IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "redroid/redroid.*12.0.0" | head -n 1)
          CONTAINER=$(docker create $IMAGE)
          docker start $CONTAINER
          
          # Создаем символические ссылки
          docker exec --user 0 $CONTAINER sh -c "
            mount -o remount,rw /system
            ln -sf /system/lib64/libndk_translation.so /system/lib64/libnb.so
            ln -sf /system/lib/libndk_translation.so /system/lib/libnb.so
            mount -o remount,ro /system
          "
          
          docker commit $CONTAINER ghcr.io/${{ github.repository_owner }}/my-redroid:12.0.0-fixed
          docker stop $CONTAINER

      - name: Push to registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/my-redroid:12.0.0-fixed
