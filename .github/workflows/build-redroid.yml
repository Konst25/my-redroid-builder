name: Build Redroid with GApps and ARM Support (Simplified)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android version'
        required: true
        default: '12.0.0'
        type: choice
        options:
          - '11.0.0'
          - '12.0.0'
          - '13.0.0'

env:
  ANDROID_VERSION: ${{ github.event.inputs.android_version || '12.0.0' }}
  IMAGE_NAME: "my-redroid"
  IMAGE_TAG: "${{ github.event.inputs.android_version || '12.0.0' }}-gapps-mindthegapps-ndk-fixed"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout redroid-script
        uses: actions/checkout@v4
        with:
          repository: ayasa520/redroid-script
          path: redroid-script

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        working-directory: ./redroid-script
        run: |
          pip install tqdm requests

      - name: Build custom image
        working-directory: ./redroid-script
        run: |
          python redroid.py \
            -a ${{ env.ANDROID_VERSION }} \
            -mtg \
            -n \
            -c docker

      - name: Find and fix image
        run: |
          # Находим созданный образ
          ORIGINAL_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "redroid/redroid.*${{ env.ANDROID_VERSION }}" | head -n 1)
          echo "Original image: $ORIGINAL_IMAGE"
          
          # Создаем Dockerfile для исправления
          cat > Dockerfile << 'EOF'
          FROM $ORIGINAL_IMAGE
          USER root
          
          # Удаляем ANGLE библиотеки
          RUN rm -f /system/lib64/libGLESv2_angle.so \
              /system/lib/libGLESv2_angle.so \
              /system/lib64/egl/libGLESv2_angle.so \
              /system/lib/egl/libGLESv2_angle.so \
              /system/lib64/libEGL_angle.so \
              /system/lib/libEGL_angle.so 2>/dev/null || true
          
          # Создаем символические ссылки на эмуляцию
          RUN if [ -f /system/lib64/libGLESv2_emulation.so ]; then \
                ln -sf /system/lib64/libGLESv2_emulation.so /system/lib64/libGLESv2_angle.so; \
              fi && \
              if [ -f /system/lib/libGLESv2_emulation.so ]; then \
                ln -sf /system/lib/libGLESv2_emulation.so /system/lib/libGLESv2_angle.so; \
              fi
          
          # Устанавливаем переменные окружения
          ENV ANDROID_EMU_GLES_LIB=libGLESv2_emulation.so
          ENV ANGLE_DISABLE=1
          ENV LIBGL_ALWAYS_SOFTWARE=1
          
          USER system
          EOF
          
          # Собираем исправленный образ
          docker build -t fixed-image:latest .
          
          # Сохраняем для следующих шагов
          echo "fixed_image=fixed-image:latest" >> $GITHUB_ENV

      - name: Prepare registry
        id: registry
        run: |
          LOWERCASE_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "full_registry=ghcr.io/${LOWERCASE_OWNER}/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT

      - name: Tag and push
        run: |
          docker tag fixed-image:latest ${{ steps.registry.outputs.full_registry }}:${{ env.IMAGE_TAG }}
          docker tag fixed-image:latest ${{ steps.registry.outputs.full_registry }}:latest
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ${{ steps.registry.outputs.full_registry }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.registry.outputs.full_registry }}:latest
